name: Privacy Policy Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/privacy-policy/**'
      - '.github/workflows/privacy-policy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-privacy-policy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_enabled: ${{ steps.pages_check.outputs.enabled }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check GitHub Pages availability
        id: pages_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS_CODE=$(curl -sS -o /tmp/pages-response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")

          if [ "${STATUS_CODE}" = "200" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Note when Pages is not enabled
        if: steps.pages_check.outputs.enabled != 'true'
        run: |
          echo "GitHub Pages is not enabled for this repository." >> "${GITHUB_STEP_SUMMARY}"
          echo "Enable it once in Settings > Pages (Source: GitHub Actions), then re-run this workflow." >> "${GITHUB_STEP_SUMMARY}"

      - name: Configure GitHub Pages
        if: steps.pages_check.outputs.enabled == 'true'
        uses: actions/configure-pages@v5

      - name: Prepare site artifact
        if: steps.pages_check.outputs.enabled == 'true'
        run: |
          mkdir -p _site/privacy-policy
          cp docs/privacy-policy/index.html _site/privacy-policy/index.html

      - name: Upload Pages artifact
        if: steps.pages_check.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: needs.build.outputs.pages_enabled == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
