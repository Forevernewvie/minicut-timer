name: Android CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Run unit tests (debug)
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Run lint (debug)
        run: ./gradlew --no-daemon -Dorg.gradle.jvmargs="-Xmx2g -Xint -Duser.language=en -Duser.country=US" lintDebug --max-workers=1

      - name: Assemble debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Run unit tests (release)
        run: ./gradlew --no-daemon testReleaseUnitTest

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-reports
          path: |
            app/build/reports/**
            app/build/test-results/**
            build/reports/**

  instrumentation:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "emulator" \
            "system-images;android-36;google_apis;x86_64"

      - name: Run startup smoke + migration instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          arch: x86_64
          profile: pixel_6
          target: google_apis
          disable-animations: true
          script: >
            ./gradlew --no-daemon connectedDebugAndroidTest
            -Pandroid.testInstrumentationRunnerArguments.class=com.minicut.timer.AppSmokeTest,com.minicut.timer.data.local.MiniCutDatabaseMigrationTest,com.minicut.timer.ui.plan.PlanNotificationPermissionTest

      - name: Upload instrumentation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumentation-reports
          path: |
            app/build/reports/androidTests/**
            app/build/outputs/androidTest-results/**
            app/build/test-results/**
